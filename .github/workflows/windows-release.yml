name: windows-release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          $baseVersion = (Get-Content VERSION -Raw).Trim()
          if (-not $baseVersion) {
            throw "VERSION file is empty"
          }
          if ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}".TrimStart("v")
            if ($version -ne $baseVersion) {
              throw "Tag version '$version' does not match VERSION '$baseVersion'"
            }
          } else {
            $version = "$baseVersion-dev.${{ github.run_number }}"
          }
          "value=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress --yes

      - name: Build release artifacts
        shell: pwsh
        run: .\scripts\build_windows_release.ps1 -Version "${{ steps.version.outputs.value }}"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-${{ steps.version.outputs.value }}
          path: |
            build/release/*.zip
            build/release/*.exe

      - name: Publish GitHub release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            build/release/*.zip
            build/release/*.exe
